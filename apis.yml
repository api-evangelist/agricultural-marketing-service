apis:
  - name: USDA AMS MARS API (MyMarketNews)
    description: >-
      The Market Analysis Reporting System (MARS) API provides programmatic
      access to USDA AMS agricultural market news data. The API allows users to
      automatically pull raw market news data including commodity prices, volume,
      and trade reports across livestock, dairy, fruits, vegetables, grains, and
      other agricultural commodities. No API key is required for basic access;
      registered users can obtain an API key for higher rate limits. Data is
      available in JSON format. Date ranges are limited to 180 days per request
      with up to 100,000 records per call.
    humanURL: https://mymarketnews.ams.usda.gov/mymarketnews-api
    baseURL: https://marsapi.ams.usda.gov/services/v1.2
    tags:
      - Market News
      - Commodity Prices
      - Agriculture
      - Livestock
      - Dairy
      - Fruits And Vegetables
    properties:
