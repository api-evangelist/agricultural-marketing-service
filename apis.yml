        url: https://mymarketnews.ams.usda.gov/mymarketnews-api
      - type: GettingStarted
        url: https://mymarketnews.ams.usda.gov/mars-api/getting-started
      - type: Authentication
        url: https://mymarketnews.ams.usda.gov/mymarketnews-api/authentication
