  - name: USDA AMS LMPRS API (Livestock Mandatory Price Reporting)
    description: >-
      The Livestock Mandatory Price Reporting System (LMPRS) API provides
      programmatic access to federally mandated livestock price report data.
      The API requires no authentication for public access and returns JSON data.
      The LMPRS API covers cattle, hogs, lambs, and other livestock price
      reporting as required by the Livestock Mandatory Reporting Act.
    humanURL: https://mpr.datamart.ams.usda.gov/
    baseURL: https://mpr.datamart.ams.usda.gov
    tags:
      - Livestock
      - Price Reporting
      - Cattle
      - Hogs
      - Agriculture
    properties:
      - type: Documentation
        url: https://www.ams.usda.gov/sites/default/files/media/USDA_LMPRS_API_User_Guide.pdf
        title: LMPRS API User Guide
      - type: DataAPI
        url: https://mpr.datamart.ams.usda.gov/
  - name: USDA Local Food Directories API
    description: >-
      The USDA Local Food Directories API provides data sharing access to
      directory information for farmers markets, food hubs, on-farm markets,
      community supported agriculture (CSA) operations, and food cooperatives
      across the United States.
    humanURL: https://www.usdalocalfoodportal.com/fe/datasharing/
    baseURL: https://www.usdalocalfoodportal.com
    tags:
