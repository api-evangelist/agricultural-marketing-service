description: >-
  The Agricultural Marketing Service (AMS), an agency of the United States
  Department of Agriculture (USDA), oversees programs in five commodity areas:
  cotton and tobacco, dairy, fruits and vegetables, livestock and seeds, and
  poultry. AMS provides testing, standardization, grading, and market news
  services. AMS operates several public APIs for agricultural market data
  including the Market Analysis Reporting System (MARS) API for real-time
  commodity market news and the Livestock Mandatory Price Reporting System
  (LMPRS) API for livestock price data.
created: '2024-11-21'
